{% extends 'base.html' %}

{% block content %}
<div class="card">
  <h2>Delete Job</h2>
  <p>Are you sure you want to delete the job: <strong>{{ job.title }}</strong>?</p>
  <form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'employer_dashboard' %}">Cancel</a>
  </form>
</div>

{% endblock %}
