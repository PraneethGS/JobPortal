{% extends 'base.html' %}

{% block content %}
<div class="card">
  <h2>Delete Application</h2>
  <p>Are you sure you want to delete your application for <strong>{{ app.job.title }}</strong>?</p>
  <form method="POST">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Yes, delete</button>
    <a class="btn btn-secondary" href="{% url 'my_applications' %}">Cancel</a>
  </form>
</div>

{% endblock %}
